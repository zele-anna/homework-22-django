{% extends 'blog/base.html' %}
{% load my_tags %}
{% block content %}
<div class="container mt-5">
        <h1 class="mb-4">Удаление книги</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'blog:article_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
