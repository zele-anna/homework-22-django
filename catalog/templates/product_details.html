{% extends 'base.html' %}
{% load my_tags %}
{% block content %}
<div class="row text-center">
    <div class="card mb-3">
        <img src="{{ product.image | media_filter }}" class="card-img-top" alt="Изображение отсутствует">
        <div class="card-body">
            <h4 class="card-title">{{ product.category }} -> {{ product.name }}</h4>
            <h5 class="card-title">{{ product.price }} руб.</h5>
            <p class="card-text">{{ product.description }}</p>
            <p class="card-text"><small class="text-body-secondary">Добавлено: {{ product.created_at | date:"d M Y" }}</small></p>
            <p class="card-text"><small class="text-body-secondary">Обновлено: {{ product.updated_at | date:"d M Y" }}</small></p>
            <a href="{% url 'catalog:home' %}" class="btn btn-primary">Назад</a>

        </div>
    </div>
</div>
{% endblock %}
