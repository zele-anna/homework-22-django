{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zelestore</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
{% include 'catalog/includes/inc_navbar.html' %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Zelestore</h1>
    <p class="lead">Zelestore - это интернет-магазин электроники</p>
    {% if user.is_authenticated %}
    <a href="{% url 'catalog:product_create' %}" class="btn btn-primary">Добавить продукт</a>
    {% endif %}
</div>

<div class="container">

    {% block content %}
    {% endblock %}

    {% include 'catalog/includes/inc_footer.html' %}

</div>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
